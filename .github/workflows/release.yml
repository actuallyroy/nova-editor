name: Release

# Build release binaries for Windows + Linux. Runs on a version tag (vX.Y.Z) and
# can be triggered manually. Tag pushes also publish a GitHub Release with the
# binaries attached. The codicon font is embedded (include_bytes!), so each build
# is a single self-contained executable — no assets to ship alongside it.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: aether.exe
            asset: aether-windows-x86_64.exe
          # Pinned to the OLDEST supported runner: the binary links against the
          # build machine's glibc, and glibc is only forward-compatible. 22.04
          # (glibc 2.35) covers Ubuntu 22.04+/Debian 12+ instead of demanding
          # 2.39 from 24.04 (#35).
          - os: ubuntu-22.04
            bin: aether
            asset: aether-linux-x86_64
          - os: macos-latest
            bin: aether
            asset: aether-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # No build cache here: the cache-save post-step is flaky on Windows and a
      # failure there marks the job failed, which skips the release-publish job.
      # Releases are infrequent, so a clean build is worth the reliability.

      # Linux build deps: rfd (GTK file dialogs), winit/glyphon (xkbcommon,
      # wayland, fontconfig), and a C/C++ toolchain for the bundled C deps
      # (tree-sitter grammars, QuickJS via rquickjs).
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev \
            libxkbcommon-dev libwayland-dev libxcb1-dev \
            libfontconfig1-dev \
            clang libclang-dev

      - name: Build release
        run: cargo build --release -p aether-renderer

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      # Package an installable Aether.app inside a .dmg (with an Applications drop
      # target). The bare binary above is kept too — the in-app auto-updater
      # downloads `aether-macos-arm64` to self-replace. The .app is unsigned, so
      # first launch needs right-click → Open (or `xattr -cr /Applications/Aether.app`).
      - name: Bundle macOS .app + DMG
        if: matrix.os == 'macos-latest'
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          APP="Aether.app"
          rm -rf "$APP" dmgroot
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/aether "$APP/Contents/MacOS/aether"
          chmod +x "$APP/Contents/MacOS/aether"
          cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>CFBundleName</key><string>Aether</string>
          <key>CFBundleDisplayName</key><string>Aether</string>
          <key>CFBundleExecutable</key><string>aether</string>
          <key>CFBundleIdentifier</key><string>com.actuallyroy.aether</string>
          <key>CFBundleVersion</key><string>${VERSION}</string>
          <key>CFBundleShortVersionString</key><string>${VERSION}</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleIconFile</key><string>icon</string>
          <key>LSMinimumSystemVersion</key><string>11.0</string>
          <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          # App icon from the bundled SVG logo (best-effort — default icon if it fails).
          if brew install librsvg >/dev/null 2>&1; then
            mkdir -p icon.iconset
            for s in 16 32 128 256 512; do
              rsvg-convert -w "$s" -h "$s" renderer/assets/logo.svg -o "icon.iconset/icon_${s}x${s}.png" || true
              rsvg-convert -w "$((s*2))" -h "$((s*2))" renderer/assets/logo.svg -o "icon.iconset/icon_${s}x${s}@2x.png" || true
            done
            iconutil -c icns icon.iconset -o "$APP/Contents/Resources/icon.icns" || true
          fi
          # DMG with an Applications symlink for drag-to-install.
          mkdir -p dmgroot
          cp -R "$APP" dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "Aether" -srcfolder dmgroot -ov -format UDZO "dist/Aether-macos-arm64.dmg"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
